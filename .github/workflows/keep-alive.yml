name: Keep backend awake

# Render's free tier spins the service down after ~15 min of no inbound
# traffic, which pauses the scrape scheduler and (with the ephemeral DB)
# empties the feed. This workflow pings /health every 10 minutes so the
# service stays awake and the 30-min scraper keeps running.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (GitHub may delay under load)
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ghost-api /health
        run: |
          echo "Pinging backend at $(date -u)"
          # Don't fail the job on a slow cold start — the ping itself is what wakes it.
          curl -fsS --max-time 90 https://ghost-api-f9cd.onrender.com/health \
            && echo "  ok" \
            || echo "  ping failed (service may be cold-starting)"
